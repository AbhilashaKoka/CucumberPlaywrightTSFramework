name: Playwright Performance Tests

on:
  workflow_dispatch:   # run manually
  schedule:
    - cron: "0 2 * * 0" # weekly run

jobs:
  perf-tests:
    runs-on: ubuntu-latest
    continue-on-error: true   # allow failures without marking workflow as failed
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: npx playwright test --grep @perf