name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers & OS dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright tests (Allure + HTML reporters)
        env:
          CI: true
        run: |
          # Use Allure + HTML + line reporters
          xvfb-run --auto-servernum -- npx playwright test --reporter=line,allure-playwright,html

      - name: Generate Allure report
        # Requires "allure-commandline" as a devDependency
        run: |
          npx allure generate --clean ./allure-results --output ./allure-report
        # If you want to include retries/flaky history across runs, see Option B for history handling.

      # Upload Allure report as artifact
      - name: Upload Allure report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14
          if-no-files-found: warn

      # Upload the Playwright HTML report even if tests fail/cancel
      - name: Upload Playwright HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      # Upload test artifacts (videos/screenshots/traces) if you store them under test-results
      - name: Upload Playwright test results (videos/screenshots/traces)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
          retention-days: 14
          if-no-files-found: ignore
