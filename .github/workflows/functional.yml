name: Playwright Functional Tests

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npx playwright test --grep-invert @perf